<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas's Math Adventure - Auto Native Handwrite</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #0f051d 0%, #290e54 50%, #14042a 100%);
            color: #ffffff;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
            touch-action: manipulation; /* 防止手機雙擊縮放，加快點擊反應 */
        }

        /* 頂部控制列 */
        .top-control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 600px;
            margin: 0 auto 10px auto;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 15px;
            border: 2px solid #00f0ff;
        }
        .control-btn {
            color: white; border: none; padding: 6px 12px; font-size: 14px;
            border-radius: 20px; cursor: pointer; font-weight: bold;
        }
        .sound-btn { background: #ff0077; }
        .reset-btn { background: #ff9900; }

        /* 主容器 */
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.06); 
            padding: 25px 20px; 
            border-radius: 25px; 
            border: 3px solid #00f0ff;
            box-shadow: 0 0 20px #00f0ff;
            backdrop-filter: blur(10px);
        }

        h1 { font-size: 32px; color: #fffb00; text-shadow: 0 0 10px #fffb00; margin: 5px 0; }
        .subtitle { font-size: 15px; color: #00f0ff; margin-bottom: 20px; }

        /* 題目超大字體 */
        h2#questionText { 
            font-size: 72px; color: #00ff66;
            text-shadow: 0 0 20px rgba(0,255,102,0.8), 4px 4px 0px #000;
            margin: 20px 0;
        }

        .upload-section { 
            background: rgba(0, 0, 0, 0.5); padding: 30px; border-radius: 20px; border: 3px dashed #ff00aa; 
        }

        /* 飛彈按鈕 */
        .action-btn { 
            padding: 16px 45px; font-size: 26px; font-weight: bold; cursor: pointer; 
            background: linear-gradient(135deg, #00ff66 0%, #00b347 100%);
            color: #000; border: none; border-radius: 50px; 
            box-shadow: 0 6px 20px rgba(0,255,102,0.5);
            margin: 15px 0;
            transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.95); }
        .orange-btn { background: linear-gradient(135deg, #ff9900 0%, #ff5500 100%); color: white; box-shadow: 0 5px 15px rgba(255,85,0,0.5); }

        /* 🎯 專為手機/平板原生手寫設計的超大直覺輸入框 */
        .input-wrapper {
            margin: 20px auto;
            width: 260px;
            position: relative;
        }
        
        input[type="text"].native-handwrite { 
            width: 100%;
            padding: 20px 10px; 
            font-size: 54px; 
            text-align: center; 
            border-radius: 25px;
            border: 4px solid #ff00aa;
            background-color: #0d041a;
            color: #fffb00;
            font-weight: bold;
            outline: none;
            box-shadow: 0 0 15px rgba(255, 0, 170, 0.4);
            transition: all 0.3s;
            box-sizing: border-box;
        }
        
        /* 當點擊準備手寫時的炫麗發光特效 */
        input[type="text"].native-handwrite:focus {
            border-color: #00f0ff;
            background-color: #170733;
            box-shadow: 0 0 25px #00f0ff;
        }

        .game-area { display: none; }
        #feedback { font-size: 28px; font-weight: bold; margin-top: 15px; min-height: 35px; }

        /* 外星人寶箱區 */
        .gallery-section { margin-top: 25px; background: rgba(0, 0, 0, 0.4); padding: 15px; border-radius: 25px; }
        .gallery-title { font-size: 18px; color: #ff00aa; margin-bottom: 10px; font-weight: bold; }
        .grid { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .monster-card {
            width: 50px; height: 50px; background: rgba(255,255,255,0.05);
            border: 2px solid #444; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 28px; 
        }
        .monster-card.unlocked {
            border-color: #fffb00; background: radial-gradient(circle, rgba(255,255,0,0.2) 0%, rgba(0,0,0,0) 70%);
            box-shadow: 0 0 10px #fffb00; transform: scale(1.05) rotate(3deg);
        }
        .monster-card.locked { filter: grayscale(100%) brightness(25%); }

        .progress-bar-container { width: 100%; background-color: #222; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .progress-bar { width: 0%; height: 10px; background: linear-gradient(90deg, #ff00aa, #00f0ff); }

        /* 捕獲彈窗 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 3, 22, 0.95);
            display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: linear-gradient(135deg, #220646 0%, #4a1291 100%); padding: 40px; border-radius: 40px;
            border: 5px solid #fffb00; box-shadow: 0 0 40px #fffb00; text-align: center; width: 80%; max-width: 450px;
        }
        .modal-emoji { font-size: 100px; margin-bottom: 15px; animation: bounce 1s infinite alternate; }
        .modal-title { font-size: 38px; color: #fffb00; font-weight: bold; margin-bottom: 10px; }
        .modal-text { font-size: 22px; color: #00f0ff; margin-bottom: 25px; line-height: 1.5; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
    </style>
</head>
<body>

<div class="top-control-bar">
    <button class="control-btn sound-btn" onclick="unlockAudio()">🎵 測試音效</button>
    <button class="control-btn reset-btn" onclick="resetGallery()">🔄 重置寶箱</button>
</div>

<div class="container">
    <h1>🚀 LUCAS 的數學太空號 🌟</h1>
    <div class="subtitle">點擊下方大框框即可手寫輸入答案，精準又方便！</div>
    
    <!-- 1. 家長上傳區 -->
    <div id="uploadArea" class="upload-section">
        <p style="font-size: 18px; color: #ccb3ff; font-weight: bold;">請家長幫 Lucas 匯入題庫 (.csv)</p>
        <input type="file" id="csvFile" accept=".csv" style="font-size: 16px; margin-bottom: 20px;"><br>
        <button class="action-btn orange-btn" onclick="loadQuestions()">啟動太空引擎 🚀</button>
    </div>

    <!-- 2. 遊戲主舞台 -->
    <div id="gameArea" class="game-area">
        <div style="font-size: 18px; color: #ff00aa; font-weight: bold;">
            連擊能量: <span id="comboCount" style="font-size: 24px; color: #fffb00;">0</span> / 3 🔥
        </div>
        
        <h2 id="questionText">計算中...</h2>
        
        <!-- 🎯 智慧型原生手寫觸發大框框 -->
        <div class="input-wrapper">
            <input type="text" 
                   id="userAnswer" 
                   class="native-handwrite" 
                   placeholder="✍️ 點我手寫" 
                   inputmode="text" 
                   autocomplete="off" 
                   autocorrect="off"
                   onkeydown="if(event.key==='Enter') fireMissile()">
        </div>
        
        <div>
            <button class="action-btn" onclick="fireMissile()">發射飛彈 💥</button>
        </div>
        
        <p id="feedback"></p>
        
        <div class="progress-bar-container">
            <div id="pBar" class="progress-bar"></div>
        </div>
    </div>

    <!-- 3. 外星人收集寶箱 -->
    <div class="gallery-section">
        <div class="gallery-title">👾 Lucas 的外星人收集寶箱 (<span id="unlockedCount">0</span>/20)</div>
        <div class="grid" id="monsterGrid"></div>
    </div>
</div>

<div id="rewardModal" class="modal-overlay">
    <div class="modal-content">
        <div id="modalEmoji" class="modal-emoji">👾</div>
        <div class="modal-title">成功捕捉！</div>
        <div id="modalText" class="modal-text">Lucas太厲害了！</div>
        <button class="action-btn" onclick="closeModal()">繼續前進 🛸</button>
    </div>
</div>

<script>
    let questionBank = []; 
    let currentIndex = 0;  
    let combo = 0; 

    const monsters = [
        { id: 1, icon: "👾", name: "波波星人" }, { id: 2, icon: "🛸", name: "發光飛碟" }, 
        { id: 3, icon: "🤖", name: "鐵皮機器人" }, { id: 4, icon: "🦖", name: "小恐龍獸" }, 
        { id: 5, icon: "🦁", name: "宇宙金獅" }, { id: 6, icon: "🐲", name: "星空太古龍" },
        { id: 7, icon: "👽", name: "神祕小灰人" }, { id: 8, icon: "🐙", name: "深海星章魚" },
        { id: 9, icon: "👻", name: "太空小幽靈" }, { id: 10, icon: "🦄", name: "銀河獨角獸" },
        { id: 11, icon: "🦊", name: "彗星火狐" }, { id: 12, icon: "🐸", name: "四維旅行蛙" },
        { id: 13, icon: "🐱", name: "喵咪太空長" }, { id: 14, icon: "🐼", name: "功夫星熊貓" },
        { id: 15, icon: "🦇", name: "黑洞夜蝙蝠" }, { id: 16, icon: "🦉", name: "預言機械鴞" },
        { id: 17, icon: "🦂", name: "天蠍座晶蠍" }, { id: 18, icon: "🦀", name: "巨蟹座機甲" },
        { id: 19, icon: "🐺", name: "月全食星狼" }, { id: 20, icon: "⭐", name: "超新星精靈王" }
    ];

    // --- 音效引擎 ---
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function unlockAudio() { initAudio(); playCorrectSound(); }
    function playLaserSound() {
        initAudio(); if (!audioCtx) return; const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(1000, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.12);
        gain.gain.setValueAtTime(0.12, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.12);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.12);
    }
    function playCorrectSound() {
        initAudio(); if (!audioCtx) return; const now = audioCtx.currentTime;
        playTone(523.25, now, 0.06, 'sine'); playTone(659.25, now + 0.04, 0.06, 'sine'); playTone(783.99, now + 0.08, 0.15, 'sine');
    }
    function playCaptureSound() {
        initAudio(); if (!audioCtx) return; const now = audioCtx.currentTime;
        playTone(523.25, now, 0.08, 'triangle'); playTone(659.25, now + 0.08, 0.08, 'triangle'); playTone(987.77, now + 0.16, 0.12, 'square'); playTone(1046.50, now + 0.28, 0.3, 'square');
    }
    function playTone(freq, startTime, duration, type) {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination); osc.type = type;
        osc.frequency.setValueAtTime(freq, startTime); gain.gain.setValueAtTime(0.1, startTime);
        gain.gain.exponentialRampToValueAtTime(0.005, startTime + duration); osc.start(startTime); osc.stop(startTime + duration);
    }

    // --- 遊戲運作邏輯 ---
    function initGallery() {
        const grid = document.getElementById('monsterGrid'); grid.innerHTML = '';
        let unlockedList = JSON.parse(localStorage.getItem('lucas_monsters')) || [];
        monsters.forEach(m => {
            const isUnlocked = unlockedList.includes(m.id);
            const card = document.createElement('div');
            card.className = `monster-card ${isUnlocked ? 'unlocked' : 'locked'}`;
            card.id = `monster-${m.id}`; card.innerText = m.icon || "👾"; grid.appendChild(card);
        });
        document.getElementById('unlockedCount').innerText = unlockedList.length;
    }

    function resetGallery() {
        if (confirm("Lucas，要重置寶箱重新收集 20 個宇宙生物嗎？")) {
            localStorage.removeItem('lucas_monsters'); combo = 0;
            document.getElementById('comboCount').innerText = combo; initGallery();
        }
    }

    function loadQuestions() {
        initAudio(); const fileInput = document.getElementById('csvFile'); const file = fileInput.files[0];
        if (!file) { alert("請先選擇題庫 .csv 檔案喔！"); return; }
        const reader = new FileReader(); reader.onload = function(e) { parseCSV(e.target.result); }; reader.readAsText(file, 'UTF-8');
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/); questionBank = []; let startIndex = 0;
        if (lines.length > 0) {
            const firstLineCols = lines[0].split(',');
            if (firstLineCols.length >= 2 && isNaN(Number(firstLineCols[1].trim()))) startIndex = 1;
        }
        for (let i = startIndex; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line) {
                const columns = line.split(',');
                if (columns.length >= 2) {
                    const q = columns[0].trim(); const a = parseInt(columns[1].trim(), 10);
                    if (q !== "" && !isNaN(a)) questionBank.push({ question: q, answer: a });
                }
            }
        }
        if (questionBank.length > 0) {
            shuffleQuestions();
            document.getElementById('uploadArea').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            showQuestion();
        } else {
            alert("無法讀取題庫！請檢查您的 CSV 檔案。");
        }
    }

    function shuffleQuestions() {
        for (let i = questionBank.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1)); [questionBank[i], questionBank[j]] = [questionBank[j], questionBank[i]];
        }
    }

    function showQuestion() {
        if (currentIndex < questionBank.length) {
            document.getElementById('questionText').innerText = questionBank[currentIndex].question;
            document.getElementById('feedback').innerText = '';
            
            const inputField = document.getElementById('userAnswer');
            inputField.value = '';
            
            // 🎯 核心自動對焦：下一題自動喚醒手機手寫板，Lucas 完全不需要手動點格清除
            setTimeout(() => {
                inputField.focus();
            }, 250);

            let progress = (currentIndex / questionBank.length) * 100;
            document.getElementById('pBar').style.width = progress + "%";
        } else {
            document.getElementById('gameArea').innerHTML = "<h2 style='color:#fffb00;'>🎉 太震撼了 Lucas！你成功完成了所有的太空數學試煉！ 🚀</h2>";
        }
    }

    function fireMissile() {
        const userAnsInput = document.getElementById('userAnswer');
        const userAnswer = parseInt(userAnsInput.value.trim(), 10);

        if (isNaN(userAnswer)) return; // 如果沒輸入或不是數字，不執行

        playLaserSound();

        // 稍微延遲讓發射音效完美播放
        setTimeout(() => {
            checkAnswer(userAnswer);
        }, 100);
    }

    function checkAnswer(userAnswer) {
        const correctAnswer = questionBank[currentIndex].answer;
        const feedback = document.getElementById('feedback');
        const userAnsInput = document.getElementById('userAnswer');

        if (userAnswer === correctAnswer) {
            feedback.style.color = "#00ff66";
            feedback.innerHTML = "⭕ 完全正確！Lucas 太棒了！ ✨";
            combo++;
            document.getElementById('comboCount').innerText = combo;

            if (combo >= 3) {
                playCaptureSound(); triggerReward(); combo = 0; document.getElementById('comboCount').innerText = combo;
            } else {
                playCorrectSound();
                setTimeout(() => { currentIndex++; showQuestion(); }, 1200);
            }
        } else {
            feedback.style.color = "#ff3366";
            feedback.innerHTML = "❌ 哎呀，飛彈偏離軌道！再算一下，你可以的！";
            combo = 0; document.getElementById('comboCount').innerText = combo;
            userAnsInput.select(); // 答錯時自動全選，方便 Lucas 直接手寫覆蓋答案
        }
    }

    function triggerReward() {
        let unlockedList = JSON.parse(localStorage.getItem('lucas_monsters')) || [];
        let lockedMonsters = monsters.filter(m => !unlockedList.includes(m.id));
        const modal = document.getElementById('rewardModal');
        const mEmoji = document.getElementById('modalEmoji'); const mText = document.getElementById('modalText');
        
        if (lockedMonsters.length > 0) {
            const luckyMonster = lockedMonsters[Math.floor(Math.random() * lockedMonsters.length)];
            unlockedList.push(luckyMonster.id); localStorage.setItem('lucas_monsters', JSON.stringify(unlockedList));
            mEmoji.innerText = luckyMonster.icon;
            mText.innerHTML = `太震撼了！Lucas 連對 3 題！<br>成功捕捉到全新宇宙生物：<br><span style="color:#fffb00; font-size:30px;">【${luckyMonster.name}】</span>！`;
            setTimeout(() => { modal.classList.add('active'); initGallery(); }, 200);
        } else {
            mEmoji.innerText = "👑"; mText.innerHTML = `終極大滿貫，Lucas！<br>你已集滿全宇宙所有 20 個生物了！`;
            setTimeout(() => { modal.classList.add('active'); }, 200);
        }
    }

    function closeModal() { document.getElementById('rewardModal').classList.remove('active'); currentIndex++; showQuestion(); }

    initGallery();
</script>

</body>
</html>
